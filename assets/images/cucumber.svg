<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="cucumberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d7a3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3d1a;stop-opacity:1" />
    </linearGradient>
    <pattern id="bumps" x="0" y="0" width="40" height="600" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="100" r="4" fill="#2d5a2d" opacity="0.5"/>
      <circle cx="20" cy="200" r="4" fill="#2d5a2d" opacity="0.5"/>
      <circle cx="20" cy="300" r="4" fill="#2d5a2d" opacity="0.5"/>
      <circle cx="20" cy="400" r="4" fill="#2d5a2d" opacity="0.5"/>
      <circle cx="20" cy="500" r="4" fill="#2d5a2d" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0b040a"/>
  <path d="M 250 100 Q 300 150 320 300 Q 310 450 280 550" stroke="url(#cucumberGrad)" stroke-width="80" fill="none" stroke-linecap="round"/>
  <rect x="210" y="100" width="80" height="450" fill="url(#cucumberGrad)"/>
  <rect x="210" y="100" width="80" height="450" fill="url(#bumps)"/>
  <text x="400" y="550" font-size="24" font-family="Montserrat, sans-serif" fill="#d0a3c2" text-anchor="middle">The Classic Cucumber</text>
</svg>