<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="melonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a5c3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2e1f;stop-opacity:1" />
    </linearGradient>
    <pattern id="ridges" x="0" y="0" width="20" height="600" patternUnits="userSpaceOnUse">
      <line x1="10" y1="0" x2="10" y2="600" stroke="#2d1f0f" stroke-width="2" opacity="0.7"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0b040a"/>
  <ellipse cx="400" cy="300" rx="130" ry="160" fill="url(#melonGrad)"/>
  <ellipse cx="400" cy="300" rx="130" ry="160" fill="url(#ridges)"/>
  <ellipse cx="350" cy="250" rx="40" ry="50" fill="#5a4a2a" opacity="0.4"/>
  <text x="400" y="550" font-size="24" font-family="Montserrat, sans-serif" fill="#d0a3c2" text-anchor="middle">The Bitter Melon</text>
</svg>