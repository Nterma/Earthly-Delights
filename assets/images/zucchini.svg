<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="zucchiniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4d7a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f3d0f;stop-opacity:1" />
    </linearGradient>
    <pattern id="stripes" x="0" y="0" width="30" height="600" patternUnits="userSpaceOnUse">
      <line x1="15" y1="0" x2="15" y2="600" stroke="#1f2f0f" stroke-width="2" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0b040a"/>
  <ellipse cx="400" cy="320" rx="100" ry="150" fill="url(#zucchiniGrad)"/>
  <ellipse cx="400" cy="320" rx="100" ry="150" fill="url(#stripes)"/>
  <ellipse cx="400" cy="180" rx="70" ry="50" fill="#3d5a1f"/>
  <text x="400" y="550" font-size="24" font-family="Montserrat, sans-serif" fill="#d0a3c2" text-anchor="middle">The Zucchini Dream</text>
</svg>